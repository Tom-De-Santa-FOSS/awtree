version: "2"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - misspell
    - unconvert
    - unparam

formatters:
  enable:
    - gofumpt
    - goimports

linters-settings:
  errcheck:
    check-type-assertions: false
    disable-default-exclusions: false
